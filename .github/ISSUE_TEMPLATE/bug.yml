name: Bug report
description: Report a reproducible problem
body:
  - type: markdown
    attributes: {value: "Do not include secrets, private addresses, prompts, or personal files."}
  - type: input
    id: version
    attributes: {label: Version or commit}
    validations: {required: true}
  - type: textarea
    id: environment
    attributes: {label: OS, Docker, and accelerator}
    validations: {required: true}
  - type: textarea
    id: steps
    attributes: {label: Reproduction steps}
    validations: {required: true}
  - type: textarea
    id: expected
    attributes: {label: Expected and actual behavior}
    validations: {required: true}
