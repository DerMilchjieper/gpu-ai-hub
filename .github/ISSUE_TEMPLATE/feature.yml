name: Feature request
description: Propose a scoped improvement
body:
  - type: textarea
    id: problem
    attributes: {label: Problem to solve}
    validations: {required: true}
  - type: textarea
    id: proposal
    attributes: {label: Proposed behavior}
    validations: {required: true}
  - type: textarea
    id: security
    attributes: {label: Security and platform impact}
