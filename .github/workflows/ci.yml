name: CI
on:
  push:
    branches: [main]
  pull_request:
permissions:
  contents: read
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.12"}
      - uses: actions/setup-node@v4
        with: {node-version: "22"}
      - run: python -m venv .venv
      - run: .venv/bin/pip install -e '.[dev]'
      - run: .venv/bin/pytest -q
      - run: node --check hub/static/app.js
      - run: bash -n scripts/*.sh
      - run: .venv/bin/python -c 'import json,pathlib,yaml; [json.load(open(p)) for p in pathlib.Path("config").glob("*.json")]; [json.load(open(p)) for p in pathlib.Path("workflows").rglob("*.json")]; yaml.safe_load(open("compose.yaml")); yaml.safe_load(open("compose.nvidia.yaml"))'
      - run: scripts/public-audit.sh
      - run: docker build -t gpu-ai-hub:ci .
      - run: docker build -t gpu-ai-hub-whisper:ci docker/whisper
